# .circleci/rollback.yml

version: 2.1

orbs:
  circleci-cli: circleci/circleci-cli@0.1.9

workflows:
  rollback:
    jobs:
      # 1. Deploy Marker: PENDING を記録
      - plan-rollback
      # 2. 対象バージョンのポリシーを再適用
      - rollback-policy:
          context: circleci-hidetaka-pat
          requires:
            - plan-rollback
      # 3. Deploy Marker: SUCCESS を記録
      - finalize-rollback:
          requires:
            - rollback-policy

jobs:
  # Environment CLI で plan（PENDING 状態にする）
  plan-rollback:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - run:
          name: Plan rollback
          command: |
            circleci run release plan \
              --environment-name=${ENVIRONMENT_NAME} \
              --component-name=${COMPONENT_NAME} \
              --target-version=${TARGET_VERSION} \
              --rollback
    environment:
      COMPONENT_NAME: << pipeline.deploy.component_name >>
      NAMESPACE: << pipeline.deploy.namespace >>
      ENVIRONMENT_NAME: << pipeline.deploy.environment_name >>
      TARGET_VERSION: << pipeline.deploy.target_version >>

  # Local CLI（orb）で対象バージョンの policy を push
  rollback-policy:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Checkout target version
          command: git checkout << pipeline.deploy.target_version >>
      - run:
          name: Push previous policy bundle
          command: circleci policy push ./config-policies --no-prompt --owner-id $CIRCLECI_ORG_ID

  # Environment CLI で update（SUCCESS にする）
  finalize-rollback:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - run:
          name: Mark rollback succeeded
          command: circleci run release update --status=SUCCESS