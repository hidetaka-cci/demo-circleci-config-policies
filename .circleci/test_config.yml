version: 2.1

orbs:
  circleci-cli: circleci/circleci-cli@0.1.9

workflows:
  main-workflow:
    jobs:
      - test-policy-bundle:
          context: circleci-hidetaka-pat       # Step 10 で作成した Context 名に置き換える
      - diff-policy-bundle:
          context: circleci-hidetaka-pat
          requires:
            - test-policy-bundle    # テストが通ってから diff
          filters:
            branches:
              ignore: main
      - push-policy-bundle:
          context: circleci-hidetaka-pat
          requires:
            - test-policy-bundle    # テストが通ってから push
          filters:
            branches:
              only: main

jobs:
  test-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Test policy bundle
          command: circleci policy test ./config-policies

  diff-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Diff policy bundle
          command: circleci policy diff ./config-policies --owner-id $CIRCLECI_ORG_ID

  push-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Plan policy deployment
          command: |
            circleci run release plan policy-push \
              --environment-name=org-policy \
              --component-name=config-policies \
              --target-version=${CIRCLE_SHA1:0:7}
      - run:
          name: Push policy bundle
          command: circleci policy push ./config-policies --no-prompt --owner-id $CIRCLECI_ORG_ID
      - run:
          name: Mark deployment succeeded
          command: circleci run release update policy-push --status=SUCCESS
          when: on_success
      - run:
          name: Mark deployment failed
          command: circleci run release update policy-push --status=FAILED
          when: on_fail