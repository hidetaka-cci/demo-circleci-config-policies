version: 2.1

orbs:
  circleci-cli: circleci/circleci-cli@0.1.9
  slack: circleci/slack@5.0

workflows:
  main-workflow:
    jobs:
      - test-policy-bundle:
          context: circleci-hidetaka-pat
      - diff-policy-bundle:
          context: circleci-hidetaka-pat
          requires:
            - test-policy-bundle
          filters:
            branches:
              ignore: main
      - push-policy-bundle:
          context: circleci-hidetaka-pat
          requires:
            - test-policy-bundle
          filters:
            branches:
              only: main
      - log-policy-deployment:
          requires:
            - push-policy-bundle
          filters:
            branches:
              only: main

  send-notification:
    jobs:
      - notify:
          context: private-slack

jobs:
  # すべてのブランチで実行: ポリシーのテスト
  test-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Test policy bundle
          command: circleci policy test ./config-policies

  # main 以外のブランチで実行: リモートとの差分確認
  diff-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Diff policy bundle
          command: circleci policy diff ./config-policies --owner-id $CIRCLECI_ORG_ID

  # main ブランチのみ: ポリシーを組織に push
  push-policy-bundle:
    executor: circleci-cli/default
    resource_class: small
    steps:
      - checkout
      - run:
          name: Push policy bundle
          command: circleci policy push ./config-policies --no-prompt --owner-id $CIRCLECI_ORG_ID

  # main ブランチのみ: push 成功後に Deploy Marker を記録
  # Environment CLI (circleci-agent) が必要なため cimg/base を使用
  log-policy-deployment:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - run:
          name: Plan policy deployment
          command: |
            circleci run release plan policy-push \
              --environment-name=org-policy \
              --component-name=config-policies \
              --target-version=${CIRCLE_SHA1:0:7}
      - run:
          name: Mark deployment succeeded
          command: circleci run release update policy-push --status=SUCCESS

  notify:
    docker:
      - image: cimg/base:current
    steps:
      - slack/notify:
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "plain_text",
                      "text": "*This is a text notification*",
                      "emoji": true
                    }
                  ]
                }
              ]
            }
          event: always