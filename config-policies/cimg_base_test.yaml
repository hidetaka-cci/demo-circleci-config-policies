# cimg/base:current を使っている場合 → PASS
test_cimg_current:
  input:
    jobs:
      build:
        docker:
          - image: cimg/base:current
  decision: &root
    status: PASS
    enabled_rules:
      - require_cimg_current

  cases:
    # cimg/base のピン留めタグ → SOFT_FAIL
    pinned_base:
      input:
        jobs:
          build:
            docker:
              - image: cimg/base:2024.01
      decision:
        <<: *root
        status: SOFT_FAIL
        soft_failures:
          - rule: require_cimg_current
            reason: "cimg/base:2024.01: CircleCI cimg イメージは :current または lts を含むタグを指定してください"

    # cimg/node もピン留めなら SOFT_FAIL
    pinned_node:
      input:
        jobs:
          build:
            docker:
              - image: cimg/node:22.0
      decision:
        <<: *root
        status: SOFT_FAIL
        soft_failures:
          - rule: require_cimg_current
            reason: "cimg/node:22.0: CircleCI cimg イメージは :current または lts を含むタグを指定してください"

    # cimg/node:current → PASS
    node_current:
      input:
        jobs:
          build:
            docker:
              - image: cimg/node:current
      decision:
        <<: *root
        status: PASS

    # cimg/node:lts → PASS
    node_lts:
      input:
        jobs:
          build:
            docker:
              - image: cimg/node:lts
      decision:
        <<: *root
        status: PASS

    # タグに lts を含む → PASS
    node_lts_suffix:
      input:
        jobs:
          build:
            docker:
              - image: cimg/node:20.10-lts
      decision:
        <<: *root
        status: PASS

    # cimg 以外のイメージ → PASS（対象外）
    other_image:
      input:
        jobs:
          build:
            docker:
              - image: node:22
      decision:
        <<: *root
        status: PASS